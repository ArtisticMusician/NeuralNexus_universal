<!DOCTYPE html>
<html>
<head>
  <title>Neural Nexus</title>
  <style>
    body { font-family: sans-serif; width: 300px; padding: 1rem; background: #0f172a; color: white; }
    input { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 4px; }
    button { width: 100%; padding: 0.5rem; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2563eb; }
    #results { margin-top: 1rem; font-size: 0.9rem; }
    .memory { padding: 0.5rem; background: #1e293b; border-bottom: 1px solid #334155; margin-bottom: 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Neural Nexus</h3>
  <input type="text" id="query" placeholder="Search memories...">
  <button id="searchBtn">Recall</button>
  <div id="results"></div>

  <hr style="margin: 1rem 0; border: 0.5px solid #334155;">

  <input type="text" id="manualText" placeholder="Add a quick fact...">
  <button id="saveBtn">Store</button>

  <script src="popup.js"></script>
</body>
</html>
