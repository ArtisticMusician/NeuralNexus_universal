version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  neural-nexus:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PORT=3000
    depends_on:
      - qdrant

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - neural-nexus
